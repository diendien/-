<!-- 🔌 diendien.github.io 專用：高相容性 PWA 雙向通訊包裝 index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>動工單導航系統</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 💡 連結 PWA 設定檔與桌面圖示 -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./app-icon.png">
  <link rel="icon" type="image/png" href="./app-icon.png">

  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#080c14; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
</head>
<body>
  <!-- 💡 已精準對接您專屬的正式部署網址 /exec -->
  <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbzvcyNqPiBSOpgm6MEA69Qw50kqz0z88eg9R7nlshT5LFEkNtGIk5m1DA2p5sWIx1oe/exec"></iframe>

  <script>
    const iframe = document.getElementById('gas-iframe');

    // 💡 Cookie 雙重備份工具（防止 iOS ITP 清除 PWA LocalStorage）
    const CookieUtil = {
      set: function(name, value, days = 30) {
        let expires = "";
        if (days) {
          let date = new Date();
          date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
          expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
      },
      get: function(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i].trim();
          if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
        }
        return null;
      }
    };

    // 監聽來自 GAS 內層沙盒的跨網域訊息
    window.addEventListener('message', function(e) {
      if (!e.data) return;

      // 1. 💾 保存狀態 (SAVE_STATE)
      if (e.data.type === 'SAVE_STATE') {
        localStorage.setItem(e.data.key, e.data.val);
        CookieUtil.set(e.data.key, e.data.val, 30); // 同步存入第一方 Cookie 作為安全備份
      }

      // 2. 🔌 同步還原憑證 (GET_ALL_STATES)
      if (e.data.type === 'GET_ALL_STATES') {
        const states = {};
        
        // 先從 LocalStorage 讀取
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key) states[key] = localStorage.getItem(key);
        }
        
        // 💡 核心自癒機制：如果 LocalStorage 被 iOS 清空，改從第一方 Cookie 還原登入憑證
        const keysToCheck = ['dispatcher_user', 'cached_dates', 'cached_people', 'cached_kw', 'cached_view', 'offline_tasks_cache'];
        keysToCheck.forEach(key => {
          if (!states[key] || states[key] === 'undefined') {
            const val = CookieUtil.get(key);
            if (val) states[key] = val;
          }
        });

        // 💡 核心安全修正：改用 e.source.postMessage 代替 iframe.contentWindow.postMessage
        // 解決 iOS 跨網域沙盒下，主視窗直接讀取 iframe.contentWindow 會被系統阻擋（為 null）的問題
        if (e.source) {
          e.source.postMessage({ type: 'SEND_ALL_STATES', states: states }, '*');
        }
      }

      // 3. 🗺️ 穿透沙盒跳轉 (喚醒導航/LINE)
      if (e.data.type === 'OPEN_EXTERNAL_URL') {
        const link = document.createElement('a');
        link.href = e.data.url;
        link.target = '_blank';
        link.click();
      }

      // 4. 🚀 處理 LINE 跳轉特別管道
      if (e.data.type === 'NAVIGATE_LINE') {
        const link = document.createElement('a');
        link.href = e.data.url;
        link.target = '_blank';
        link.click();
      }

      // 5. 🔒 安全登出
      if (e.data.type === 'LOGOUT_CLEAR') {
        localStorage.clear();
        // 清除 Cookie 備份
        const keysToClear = ['dispatcher_user', 'cached_dates', 'cached_people', 'cached_kw', 'cached_view', 'offline_tasks_cache'];
        keysToClear.forEach(key => {
          CookieUtil.set(key, "", -1);
        });
      }
    });
  </script>

  <!-- 💡 註冊 Service Worker 啟用完整的 PWA 模式 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功', reg))
          .catch(err => console.log('Service Worker 註冊失敗', err));
      });
    }
  </script>
</body>
</html>
