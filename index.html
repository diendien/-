<!-- 🔌 diendien.github.io 專用：高相容性 PWA 雙向通訊包裝 index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>動工單導航系統</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 連結 PWA 設定檔與桌面圖示 -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./app-icon.png">
  <link rel="icon" type="image/png" href="./app-icon.png">

  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#080c14; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
  
  <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1fb00XZVBQ3ctXYNVaw2MFKI4Bi4b9pNd">
  <!-- 💡 iOS PWA 啟動畫面動態生成引擎 (升級版：Logo 放大 + 文字 “樂清”) -->
  <script>
    (function() {
      const isApple = /ipad|iphone|ipod/i.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (!isApple) return;

      const iconUrl = './app-icon.png'; 
      const bgColor = '#080c14'; 

      const w = window.screen.width * window.devicePixelRatio;
      const h = window.screen.height * window.devicePixelRatio;
      
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      // 1. 填滿深色背景
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, w, h);

      // 2. 載入並繪製居中 Logo
      const img = new Image();
      img.onload = function() {
        // 💡 修正 1：Logo 比例從原本的 18% 調大至 45% (視覺大小放大約 3 ~ 4 倍)
        const logoSize = Math.min(w, h) * 0.45; 
        const x = (w - logoSize) / 2;
        // 將 Logo 位置稍微往上提一點，為下方的文字留出空間
        const y = (h - logoSize) / 2 - (logoSize * 0.12); 
        
        ctx.drawImage(img, x, y, logoSize, logoSize);
        
        // 💡 修正 2：在圖片下方建立文字 “樂清”
        const fontSize = Math.round(logoSize * 0.16); // 根據 Logo 大小自動調整最適合的字體大小
        ctx.font = "bold " + fontSize + "px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
        ctx.fillStyle = '#ffffff'; // 白色字體
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        
        // 將文字繪製在 Logo 底部的下方 (並保持優雅的間距)
        const textY = y + logoSize + (logoSize * 0.15);
        ctx.fillText("樂清", w / 2, textY);
        
        // 3. 輸出為啟動畫面
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('link');
        link.rel = 'apple-touch-startup-image';
        link.href = dataUrl;
        document.head.appendChild(link);
      };
      img.src = iconUrl;
    })();
  </script>
  <meta name="apple-mobile-web-app-title" content="動工導航">
  
</head>
<body>
  <!-- 已精準對接您的正式部署網址 -->
  <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbytkzzvbck-hBgo62hQv1FIXJfMzhijJ04fzEs-dCJ7k7I0vKrnBZ7XOuk7GiMbxbjB/exec" allow="geolocation; camera; microphone; clipboard-write;"></iframe>
  <script>
    const iframe = document.getElementById('gas-iframe');

    // Cookie 雙重備份工具（防止 iOS ITP 清除 PWA LocalStorage）
    const CookieUtil = {
      set: function(name, value, days = 30) {
        let expires = "";
        if (days) {
          let date = new Date();
          date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
          expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
      },
      get: function(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i].trim();
          if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
        }
        return null;
      }
    };

    // 監聽來自 GAS 內層沙盒的跨網域訊息
    window.addEventListener('message', function(e) {
      if (!e.origin.endsWith('.googleusercontent.com') && !e.origin.startsWith('https://script.google.com')) return;
      if (!e.data) return;

      // 1. 💾 保存狀態 (SAVE_STATE)
      if (e.data.type === 'SAVE_STATE') {
        localStorage.setItem(e.data.key, e.data.val);
        CookieUtil.set(e.data.key, e.data.val, 30); // 同步存入 Cookie
      }

      // 2. 🔌 同步還原憑證與各分頁暫存舊資料 (GET_ALL_STATES)
      if (e.data.type === 'GET_ALL_STATES') {
        const states = {};
        
        // 先從 LocalStorage 讀取
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key) states[key] = localStorage.getItem(key);
        }
        
        // 💡 修正：將月卡單快取、日曆快取鍵值全部納入 Cookie 備份清單中，確保清空時能完美還原
        const keysToCheck = [
          'dispatcher_user', 'cached_dates', 'cached_people', 'cached_kw', 'cached_view', 'offline_tasks_cache',
          'cached_report_thead', 'cached_report_tbody', 'cached_report_type',
          'cached_calendar_grid_html', 'cached_calendar_title', 'cached_calendar_year', 'cached_calendar_month'
        ];
        keysToCheck.forEach(key => {
          if (!states[key] || states[key] === 'undefined') {
            const val = CookieUtil.get(key);
            if (val) states[key] = val;
          }
        });

        // 💡 修正：改用 e.source.postMessage，解決 iOS standalone 下主視窗直接讀取 iframe.contentWindow 被阻擋為 null 的問題
        if (e.source) {
          e.source.postMessage({ type: 'SEND_ALL_STATES', states: states }, '*');
        }
      }

      // 🆕 複製文字＋跳轉 LINE（一起在最外層執行，繞開 iframe 沙盒 clipboard 限制）
      if (e.data.type === 'COPY_AND_NAVIGATE_LINE') {
        const doNav = () => {
          const link = document.createElement('a');
          link.href = e.data.url;
          link.rel = 'noopener';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(e.data.text || '').then(doNav).catch(doNav);
        } else {
          doNav();
        }
      }

      // 3. 🗺️ 穿透沙盒跳轉 (喚醒導航/LINE)
      if (e.data.type === 'OPEN_EXTERNAL_URL' || e.data.type === 'NAVIGATE_LINE') {
        const link = document.createElement('a');
        link.href = e.data.url;
        link.rel = 'noopener';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // 5. 🔒 安全登出
      if (e.data.type === 'LOGOUT_CLEAR') {
        localStorage.clear();
        const keysToClear = [
          'dispatcher_user', 'cached_dates', 'cached_people', 'cached_kw', 'cached_view', 'offline_tasks_cache',
          'cached_report_thead', 'cached_report_tbody', 'cached_report_type',
          'cached_calendar_grid_html', 'cached_calendar_title', 'cached_calendar_year', 'cached_calendar_month'
        ];
        keysToClear.forEach(key => {
          CookieUtil.set(key, "", -1);
        });
      }
    });
  </script>

  <!-- 註冊 Service Worker 啟用完整的 PWA 模式 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功', reg))
          .catch(err => console.log('Service Worker 註冊失敗', err));
      });
    }
  </script>
</body>
</html>
