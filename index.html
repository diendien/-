<!-- 🔌 diendien.github.io 專用：高相容性 PWA 雙向通訊包裝 index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>動工單導航系統</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 💡 連結 PWA 設定檔與桌面圖示 -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./app-icon.png">
  <link rel="icon" type="image/png" href="./app-icon.png">

  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#080c14; }
    iframe { border:none; width:100%; height:100%; display:block; }
  </style>
</head>
<body>
  <!-- 💡 已精準對接您專屬的正式部署網址 /exec -->
  <iframe id="gas-iframe" src="https://script.google.com/macros/s/AKfycbzvcyNqPiBSOpgm6MEA69Qw50kqz0z88eg9R7nlshT5LFEkNtGIk5m1DA2p5sWIx1oe/exec"></iframe>

  <script>
    const iframe = document.getElementById('gas-iframe');

    // 監聽來自 GAS 內層沙盒的跨網域訊息
    window.addEventListener('message', function(e) {
      if (!e.data) return;

      // 1. 💾 保存狀態 (SAVE_STATE)
      if (e.data.type === 'SAVE_STATE') {
        localStorage.setItem(e.data.key, e.data.val);
      }

      // 2. 🔌 同步還原憑證 (GET_ALL_STATES)
      if (e.data.type === 'GET_ALL_STATES') {
        const states = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          states[key] = localStorage.getItem(key);
        }
        iframe.contentWindow.postMessage({ type: 'SEND_ALL_STATES', states: states }, '*');
      }

      // 3. 🗺️ 穿透沙盒跳轉 (喚醒導航/LINE)
      if (e.data.type === 'OPEN_EXTERNAL_URL') {
        // 💡 關鍵修正：改用虛擬 <a> 標籤 + target="_blank" 來喚醒外部 App 或地圖
        // 這能確保桌面程式的主視窗永遠停留在 diendien.github.io 作用域內，防止系統因越界而清空登入憑證
        const link = document.createElement('a');
        link.href = e.data.url;
        link.target = '_blank';
        link.click();
      }

      // 4. 🚀 處理 LINE 跳轉特別管道
      if (e.data.type === 'NAVIGATE_LINE') {
        const link = document.createElement('a');
        link.href = e.data.url;
        link.target = '_blank';
        link.click();
      }

      // 5. 🔒 安全登出
      if (e.data.type === 'LOGOUT_CLEAR') {
        localStorage.clear();
      }
    });
  </script>

  <!-- 💡 註冊 Service Worker 啟用完整的 PWA 模式 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功', reg))
          .catch(err => console.log('Service Worker 註冊失敗', err));
      });
    }
  </script>
</body>
</html>
